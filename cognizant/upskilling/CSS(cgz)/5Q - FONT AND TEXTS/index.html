<!DOCTYPE html>
<html>
<head>
    <title>Typography Example</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }

        h1 {
            font-size: 36px;
            font-weight: 700;
            text-align: center;
            text-transform: uppercase;
        }

        h2 {
            font-size: 24px;
            font-style: italic;
            font-weight: 400;
        }

        p {
            font-size: 18px;
            text-align: justify;
            letter-spacing: 1px;
            line-height: 1.8;
        }
    </style>
</head>

<body>

    <h1>City Events Portal</h1>

    <h2>Upcoming Events</h2>

    <p>
        Welcome to the city events portal. Here you can find information
        about cultural programs, community activities, and public events.
    </p>

</body>
</html>
